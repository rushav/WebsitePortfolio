<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Project — Rushav Dash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #f4f1ea;
    --bg-elev:   #ebe6db;
    --bg-card:   #fbf8f1;
    --fg:        #0d0d0d;
    --fg-dim:    #4a4a4a;
    --fg-mute:   #888075;
    --line:      #1a1a1a;
    --line-soft: rgba(0,0,0,.14);
    --rule:      rgba(0,0,0,.08);
    --prompt:    #2f7d3a;
    --cursor:    #0d0d0d;
    --accent:    #2f7d3a;
    --hl:        #ffe27a;
    --hl-text:   #0d0d0d;
    --selection: rgba(47,125,58,.22);
    --grid-dot:  rgba(0,0,0,.09);
    --glow:      #8a62d4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace;
    font-size:21px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--selection);}

  .window{width:100%;min-height:100vh;margin:0;border:0;background:var(--bg);display:flex;flex-direction:column;
    --gutter:clamp(24px, 6vw, 96px);
  }

  .chrome{
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;
    gap:12px;padding:10px var(--gutter);border-bottom:1px solid var(--line);
    background:var(--bg-elev);font-size:19px;color:var(--fg-dim);
  }
  .dots{display:flex;gap:7px;}
  .dot{width:11px;height:11px;border-radius:50%;border:1px solid var(--line);background:transparent;}
  .chrome .title{text-align:center;letter-spacing:.06em;}
  .back{color:var(--fg);text-decoration:none;font-size:18px;letter-spacing:.1em;
        border:1px solid var(--line);padding:4px 9px;}
  .back:hover{background:var(--fg);color:var(--bg);}

  .crumb{
    display:flex;gap:8px;align-items:center;padding:10px var(--gutter);border-bottom:1px dashed var(--line-soft);
    font-size:19.5px;
  }
  .crumb .p{color:var(--prompt);font-weight:600;}
  .crumb .mute{color:var(--fg-mute);}
  .crumb .cur{color:var(--fg);font-weight:600;}
  .cursor{display:inline-block;width:9px;height:14px;background:var(--cursor);vertical-align:-2px;margin-left:3px;animation:blink 1.1s steps(2) infinite;}
  @keyframes blink{50%{opacity:0;}}

  .section{border-bottom:1px solid var(--line);}
  .section-head{
    display:grid;grid-template-columns:1fr auto;gap:10px;align-items:baseline;
    padding:18px var(--gutter) 10px;border-bottom:1px dashed var(--line-soft);
  }
  .section-head.flush{padding:14px 0 10px;border-bottom:1px dashed var(--line-soft);margin-bottom:14px;}
  .kicker{font-size:18px;letter-spacing:.22em;color:var(--fg-mute);text-transform:uppercase;display:block;margin-bottom:2px;}
  .shead{font-size:25px;font-weight:600;letter-spacing:-.01em;}
  .shead .prompt{color:var(--prompt);margin-right:6px;}
  .meta{font-size:18px;color:var(--fg-mute);letter-spacing:.1em;}
  .label{color:var(--fg-mute);font-size:18px;letter-spacing:.18em;margin-bottom:8px;text-transform:uppercase;}

  .hero-d{padding:28px var(--gutter) 28px;position:relative;
    background:
      radial-gradient(900px 340px at 92% 0%, color-mix(in oklab, var(--glow) 8%, transparent), transparent 60%);
  }
  .hero-d-grid{display:grid;grid-template-columns:1fr 1.05fr;gap:40px;align-items:start;}

  .pid{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;font-size:17.5px;letter-spacing:.14em;text-transform:uppercase;}
  .pid-idx{color:var(--fg);border:1px solid var(--line);padding:3px 7px;background:var(--bg-card);}
  .pid-tag{color:color-mix(in oklab, var(--glow) 70%, var(--fg));
    border:1px solid color-mix(in oklab, var(--glow) 60%, var(--line));padding:3px 7px;
    background:color-mix(in oklab, var(--glow) 10%, transparent);}
  .pid-status{color:var(--fg-mute);}
  .pid-status.done{color:var(--prompt);}
  .pid-status.wip{color:#8a5c00;}

  .ptitle{
    font-size:71px;font-weight:700;letter-spacing:-.03em;line-height:1;margin:0 0 12px;
    color:var(--fg);
  }
  .oneliner{
    font-size:23px;color:var(--fg-dim);margin:0 0 22px;max-width:56ch;line-height:1.55;
    border-left:2px solid var(--prompt);padding-left:14px;
  }

  .kv{
    display:grid;grid-template-columns:140px 1fr;row-gap:6px;column-gap:20px;font-size:19.5px;
    border-top:1px dashed var(--line-soft);border-bottom:1px dashed var(--line-soft);
    padding:14px 0;margin-bottom:22px;
  }
  .kv .k{color:var(--fg-mute);letter-spacing:.08em;}

  .desc p{margin:0 0 12px;color:var(--fg-dim);font-size:20.5px;line-height:1.75;max-width:62ch;}
  .skills-d{margin-top:20px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px 7px;}
  .chip{font-size:18.5px;padding:3px 9px;border:1px solid var(--line-soft);color:var(--fg);background:var(--bg-card);border-radius:2px;transition:all .12s ease;}
  .chip:hover{border-color:var(--prompt);color:var(--prompt);box-shadow:0 0 10px color-mix(in oklab, var(--prompt) 25%, transparent);}

  .cta-row{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap;}
  .btn{
    font-family:inherit;font-size:19px;letter-spacing:.08em;text-decoration:none;
    padding:9px 14px;border:1px solid var(--line);background:transparent;color:var(--fg);
    cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .15s ease;
  }
  .btn:hover{background:var(--fg);color:var(--bg);}

  .hero-right{position:sticky;top:16px;}
  .img-head{
    display:flex;justify-content:space-between;align-items:center;
    font-size:17px;letter-spacing:.18em;color:var(--fg-mute);text-transform:uppercase;
    margin-bottom:8px;
  }
  .img-cap{margin-top:10px;font-size:18px;letter-spacing:.1em;color:var(--fg-mute);text-transform:uppercase;}

  .slot{margin:0;padding:0;display:block;width:100%;border:0;background:transparent;text-align:left;cursor:default;}
  .slot-frame{
    position:relative;width:100%;aspect-ratio:var(--ratio, 4/3);
    border:1px solid var(--line);background:var(--bg-card);overflow:hidden;
  }
  .slot-frame img{width:100%;height:100%;object-fit:cover;display:block;}
  .slot-empty{
    position:absolute;inset:0;color:var(--fg-mute);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  }
  .slot-empty svg{position:absolute;inset:0;width:100%;height:100%;opacity:.35;}
  .slot-info{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px;text-align:center;}
  .slot-tag{font-size:17px;letter-spacing:.2em;color:var(--fg);border:1px solid var(--line);padding:2px 8px;background:var(--bg);}
  .slot-ratio{font-size:17.5px;letter-spacing:.12em;color:var(--fg-mute);}
  .slot-alt{font-size:18px;color:var(--fg-dim);max-width:28ch;line-height:1.4;}
  .slot figcaption{margin-top:8px;font-size:17.5px;letter-spacing:.12em;color:var(--fg-mute);text-transform:uppercase;}

  .body-d{padding:24px var(--gutter) 28px;}
  .body-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:40px;align-items:start;}
  .body-grid.single{grid-template-columns:1fr;}

  .block{margin-bottom:24px;}
  .block-body p{margin:0 0 12px;color:var(--fg-dim);font-size:20.5px;line-height:1.75;}

  .details-list{display:grid;grid-template-columns:150px 1fr;row-gap:8px;column-gap:16px;margin:0;font-size:20px;}
  .details-list dt{color:var(--fg-mute);letter-spacing:.08em;font-size:18.5px;text-transform:uppercase;padding-top:2px;}
  .details-list dd{margin:0;color:var(--fg);}

  .outcomes{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .outcome{
    border:1px solid var(--line);background:var(--bg-card);padding:14px 16px;
    display:flex;flex-direction:column;gap:4px;
    position:relative;overflow:hidden;
  }
  .outcome::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--prompt);
  }
  .metric{font-size:35px;font-weight:700;letter-spacing:-.02em;color:var(--fg);line-height:1;padding-left:4px;}
  .olabel{font-size:18.5px;color:var(--fg-dim);letter-spacing:.04em;line-height:1.45;padding-left:4px;}

  .body-right{position:sticky;top:16px;}
  .flow{border:1px solid var(--line);background:var(--bg-card);padding:16px;}
  .flow-head{
    display:flex;justify-content:space-between;align-items:center;
    padding-bottom:10px;margin-bottom:8px;border-bottom:1px dashed var(--line-soft);
  }
  .flow-head .kicker{margin-bottom:0;}
  .flow-svg{display:block;width:100%;height:auto;color:var(--line);}
  .flow-note{
    font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.45;
    color:var(--fg-dim);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }

  .gallery-d{padding:0 0 28px;}
  .gallery-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:0 var(--gutter);
  }
  .gallery-grid .slot figcaption{margin-top:6px;}

  .foot{padding:16px var(--gutter) 24px;font-size:19px;color:var(--fg-mute);display:flex;justify-content:space-between;align-items:center;}
  .foot .p{color:var(--prompt);}

  .notfound{padding:80px var(--gutter);display:flex;flex-direction:column;gap:20px;align-items:flex-start;}
  .notfound h1{margin:0;font-size:39px;font-weight:700;letter-spacing:-.02em;}
  .notfound p{margin:0;color:var(--fg-dim);}

  /* lightbox — clickable gallery image overlay */
  .slot.clickable .slot-frame{cursor:zoom-in;transition:border-color .15s ease;}
  .slot.clickable:hover .slot-frame{border-color:var(--prompt);}
  .slot.clickable:focus{outline:none;}
  .slot.clickable:focus .slot-frame{border-color:var(--prompt);box-shadow:0 0 0 2px color-mix(in oklab, var(--prompt) 35%, transparent);}
  .lightbox{
    position:fixed;inset:0;z-index:9999;
    background:rgba(10,12,14,.92);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 24px;cursor:zoom-out;
    animation:lb-fade .14s ease-out;
  }
  @keyframes lb-fade{from{opacity:0;}to{opacity:1;}}
  .lightbox-close{
    position:absolute;top:18px;right:22px;
    background:transparent;border:1px solid #e8e3d9;color:#e8e3d9;
    font-family:inherit;font-size:18px;letter-spacing:.12em;
    padding:6px 12px;cursor:pointer;transition:all .15s ease;
  }
  .lightbox-close:hover{background:#e8e3d9;color:#0d0d0d;}
  .lightbox-img{
    max-width:92vw;max-height:82vh;object-fit:contain;display:block;
    border:1px solid rgba(255,255,255,.15);background:#0a0f14;cursor:default;
  }
  .lightbox-cap{
    margin-top:14px;color:#d4d0c6;font-size:19px;letter-spacing:.08em;
    max-width:80vw;text-align:center;line-height:1.5;
  }

  @media (max-width:1080px){
    .hero-d-grid{grid-template-columns:1fr;}
    .body-grid{grid-template-columns:1fr;}
    .hero-right,.body-right{position:static;}
    .ptitle{font-size:55px;}
    .gallery-grid{grid-template-columns:repeat(3,1fr);}
  }
  @media (max-width:720px){
    .gallery-grid{grid-template-columns:repeat(2,1fr);}
    .outcomes{grid-template-columns:1fr;}
    .details-list{grid-template-columns:1fr;row-gap:2px;}
    .details-list dd{margin-bottom:6px;}
    .ptitle{font-size:47px;}
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="data/projects.js"></script>
<script type="text/babel" src="scripts/project-detail.jsx"></script>
</body>
</html>
