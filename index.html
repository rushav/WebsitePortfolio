<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Rushav Dash — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* LIGHT (professional terminal paper) */
    --bg:        #f4f1ea;
    --bg-elev:   #ebe6db;
    --bg-card:   #fbf8f1;
    --fg:        #0d0d0d;
    --fg-dim:    #4a4a4a;
    --fg-mute:   #888075;
    --line:      #1a1a1a;
    --line-soft: rgba(0,0,0,.14);
    --rule:      rgba(0,0,0,.08);
    --prompt:    #2f7d3a;
    --cursor:    #0d0d0d;
    --accent:    #2f7d3a;
    --hl:        #ffe27a;
    --hl-text:   #0d0d0d;
    --selection: rgba(47,125,58,.22);
    --grid-dot:  rgba(0,0,0,.09);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace;
    font-size:21px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
    transition:background .2s ease,color .2s ease;
  }
  ::selection{background:var(--selection);}

  /* app shell — window chrome wraps entire page so the whole portfolio
     reads like a professional terminal pane */
  .window{width:100%;min-height:100vh;margin:0;border:0;background:var(--bg);display:flex;flex-direction:column;
    --gutter:clamp(24px, 6vw, 96px);
  }

  /* title bar */
  .chrome{
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;
    gap:12px;padding:10px var(--gutter);border-bottom:1px solid var(--line);
    background:var(--bg-elev);
    font-size:19px;color:var(--fg-dim);
  }
  .dots{display:flex;gap:7px;}
  .dot{width:11px;height:11px;border-radius:50%;border:1px solid var(--line);background:transparent;}
  .chrome .title{text-align:center;letter-spacing:.06em;}
  .chrome .right{display:flex;gap:10px;align-items:center;}

  /* section scaffold */
  .section{border-bottom:1px solid var(--line);}
  .section-head{
    display:grid;grid-template-columns:1fr auto;gap:10px;align-items:baseline;
    padding:18px var(--gutter) 10px;border-bottom:1px dashed var(--line-soft);
  }
  .kicker{font-size:18px;letter-spacing:.22em;color:var(--fg-mute);text-transform:uppercase;}
  .shead{font-size:27px;font-weight:600;letter-spacing:-.01em;}
  .shead .prompt{color:var(--prompt);margin-right:6px;}
  .meta{font-size:18px;color:var(--fg-mute);letter-spacing:.1em;}

  /* prompt-styled line */
  .pline{display:flex;gap:10px;align-items:baseline;}
  .pline .p{color:var(--prompt);font-weight:600;}
  .pline .c{color:var(--fg);}

  /* hero */
  .hero{padding:34px var(--gutter) 32px;position:relative;
    background:
      radial-gradient(900px 340px at 8% 0%, color-mix(in oklab, var(--prompt) 10%, transparent), transparent 60%),
      linear-gradient(to bottom, var(--bg) 0%, var(--bg) 100%);
  }
  .hero-grid{display:grid;grid-template-columns:1.8fr 1fr;gap:24px;align-items:start;}

  /* lidar maze */
  .maze-wrap{
    position:relative;
    width:100%; aspect-ratio:1/1;
    border:1px solid var(--line);
    background:var(--bg-card);
    padding:0;
    box-shadow: inset 0 0 40px color-mix(in oklab, var(--prompt) 8%, transparent);
    overflow:hidden;
    contain:strict;
  }
  .maze-wrap::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 45%, color-mix(in oklab, var(--prompt) 5%, transparent) 100%);
  }
  .maze-wrap canvas{
    position:absolute;inset:0;
    display:block;width:100%;height:100%;
  }
  .maze-label{
    margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;
    font-size:17px;letter-spacing:.18em;color:var(--fg-mute);text-transform:uppercase;
  }
  .maze-stats{
    margin-top:8px;
    display:flex;justify-content:space-between;
    font-size:17px;letter-spacing:.14em;color:var(--fg-mute);text-transform:uppercase;
  }
  .maze-stats .blink{color:var(--prompt);animation:blink 1.4s steps(2) infinite;}
  .ascii{
    font-family:'JetBrains Mono',monospace;
    font-size:16px;line-height:1;letter-spacing:0;
    white-space:pre;margin:0 0 18px;
    color:var(--fg);
    font-weight:700;
    text-shadow:0 0 18px color-mix(in oklab, var(--prompt) 28%, transparent);
  }
  .ascii .accent{color:var(--prompt);}

  .about-block{margin-top:8px;}
  .about-block .label{color:var(--fg-mute);font-size:18px;letter-spacing:.18em;margin-bottom:6px;text-transform:uppercase;}
  .about-block p{margin:0 0 14px;color:var(--fg-dim);font-size:20.5px;line-height:1.75;}
  .about-block mark{background:linear-gradient(transparent 60%, var(--hl) 60%);color:var(--hl-text);padding:0 2px;}

  .contact{
    margin-top:18px;display:grid;grid-template-columns:90px 1fr;row-gap:4px;font-size:20px;
    border-top:1px dashed var(--line-soft);padding-top:14px;
  }
  .contact .k{color:var(--fg-mute);}
  .contact a{color:var(--fg);text-decoration:none;border-bottom:1px solid var(--fg-mute);}
  .contact a:hover{color:var(--prompt);border-bottom-color:var(--prompt);}

  .cta-row{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;}
  .btn{
    font-family:inherit;font-size:19.5px;letter-spacing:.08em;text-decoration:none;
    padding:9px 14px;border:1px solid var(--line);background:transparent;color:var(--fg);
    cursor:pointer;display:inline-flex;align-items:center;gap:8px;
    transition:all .15s ease;
  }
  .btn:hover{background:var(--fg);color:var(--bg);}
  .btn.primary{background:var(--prompt);color:var(--bg);border-color:var(--prompt);}
  .btn.primary:hover{background:transparent;color:var(--prompt);}
  .btn .key{font-size:17px;opacity:.7;border:1px solid currentColor;padding:0 5px;border-radius:2px;}

  .cursor{display:inline-block;width:9px;height:16px;background:var(--cursor);vertical-align:-2px;margin-left:3px;animation:blink 1.1s steps(2) infinite;}
  @keyframes blink{50%{opacity:0;}}

  /* projects */
  .proj-head{display:flex;gap:18px;align-items:center;padding:0 var(--gutter) 16px;flex-wrap:wrap;}
  .legend{display:flex;gap:14px;font-size:18px;color:var(--fg-mute);letter-spacing:.1em;flex-wrap:wrap;}
  .legend .swatch{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle;}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:0 var(--gutter) 28px;}
  .card{
    position:relative;
    background:var(--bg-card);
    border:1px solid var(--line);
    padding:18px 18px 16px;
    display:flex;flex-direction:column;min-height:240px;
    transition:transform .18s ease, box-shadow .25s ease, border-color .18s ease;
    cursor:pointer;
    text-decoration:none;color:inherit;
  }
  .card.wip{border-style:dashed;border-color:color-mix(in oklab, #c48b00 55%, var(--line));}
  .card.wip::after{
    content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:repeating-linear-gradient(45deg,#c48b00 0 6px, transparent 6px 12px);
  }
  .card.done::after{
    content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--prompt);
  }
  .card::before{
    content:"";position:absolute;inset:-1px;pointer-events:none;
    border-radius:inherit;
    box-shadow: 0 0 0 1px color-mix(in oklab, var(--glow) 35%, transparent) inset,
                0 0 24px -2px color-mix(in oklab, var(--glow) 22%, transparent);
    opacity:.55;transition:opacity .25s ease, box-shadow .25s ease;
  }
  .card:hover{transform:translateY(-3px);border-color:color-mix(in oklab, var(--glow) 70%, var(--line));}
  .card:hover::before{opacity:1;
    box-shadow: 0 0 0 1px color-mix(in oklab, var(--glow) 70%, transparent) inset,
                0 0 40px -4px color-mix(in oklab, var(--glow) 55%, transparent);
  }
  .card-head{display:flex;justify-content:space-between;align-items:center;font-size:17.5px;letter-spacing:.12em;color:var(--fg-mute);text-transform:uppercase;margin-bottom:10px;gap:8px;}
  .idx{color:var(--fg);opacity:.65;}
  .tag{border:1px solid color-mix(in oklab, var(--glow) 60%, var(--line));color:color-mix(in oklab, var(--glow) 75%, var(--fg));padding:2px 7px;border-radius:2px;font-size:16.5px;background:color-mix(in oklab, var(--glow) 8%, transparent);}

  .spill{
    display:inline-flex;align-items:center;gap:6px;
    font-size:16.5px;letter-spacing:.14em;font-weight:600;
    padding:3px 7px 3px 8px;border-radius:2px;text-transform:uppercase;
    border:1px solid currentColor;
  }
  .spill.done{color:var(--prompt);background:color-mix(in oklab, var(--prompt) 10%, transparent);}
  .spill.wip {color:#8a5c00;background:color-mix(in oklab, #c48b00 14%, transparent);border-color:color-mix(in oklab, #c48b00 60%, var(--line));}
  .spill .pd{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .spill.done .pd{background:var(--prompt);box-shadow:0 0 8px color-mix(in oklab, var(--prompt) 60%, transparent);}
  .spill.wip  .pd{background:#c48b00;box-shadow:0 0 8px color-mix(in oklab, #c48b00 70%, transparent);animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(.6);opacity:.5;}}

  .card h3{margin:0 0 6px;font-size:29px;font-weight:600;letter-spacing:-.01em;line-height:1.15;color:var(--fg);}
  .when{display:inline-flex;align-items:center;gap:6px;font-size:18.5px;color:var(--fg-mute);margin-bottom:10px;letter-spacing:.04em;}
  .when::before{content:"▸";color:var(--fg-mute);}
  .card.wip .when{color:#8a5c00;}
  .card.wip .when::before{color:#c48b00;}
  .card p{margin:0 0 12px;color:var(--fg-dim);font-size:19.5px;line-height:1.6;flex:1;}
  .card-foot{display:flex;justify-content:space-between;align-items:center;font-size:17.5px;letter-spacing:.1em;color:var(--fg-mute);text-transform:uppercase;padding-top:10px;border-top:1px dashed var(--line-soft);}
  .sponsor{display:inline-flex;align-items:center;gap:6px;}
  .sponsor .sdot{width:6px;height:6px;border-radius:50%;background:var(--glow);box-shadow:0 0 6px var(--glow);}
  .cd{color:color-mix(in oklab, var(--glow) 70%, var(--fg));}
  .cd .arrow{margin-left:3px;}

  /* experience — gantt */
  .exp-wrap{padding:6px var(--gutter) 28px;}
  .legend-exp{display:flex;gap:18px;font-size:17.5px;color:var(--fg-mute);letter-spacing:.12em;text-transform:uppercase;padding:0 0 10px;}
  .leg-sw{display:inline-block;width:16px;height:8px;margin-right:6px;vertical-align:middle;border:1px solid var(--line);}
  .leg-sw.work{background:var(--fg);}
  .leg-sw.res{background:repeating-linear-gradient(45deg, var(--fg) 0 1px, transparent 1px 4px);}
  .leg-sw.edu{background:transparent;border-style:dashed;}

  .ruler{position:relative;height:22px;border-bottom:1px solid var(--line);}
  .ruler .tick{position:absolute;top:0;bottom:0;width:1px;background:var(--line-soft);}
  .ruler .year{position:absolute;bottom:3px;transform:translateX(-50%);font-size:17.5px;color:var(--fg-mute);letter-spacing:.08em;}
  .ruler .year::before{content:"│ ";color:var(--line);}

  .gantt-row{display:grid;grid-template-columns:340px 1fr;gap:14px;align-items:center;padding:10px 0;border-bottom:1px dotted var(--line-soft);}
  .gantt-row .lbl-btn{
    background:transparent;border:0;padding:0;margin:0;
    font:inherit;color:inherit;text-align:left;width:100%;
    display:flex;align-items:flex-start;gap:8px;
  }
  .gantt-row .lbl-btn.interactive{cursor:pointer;}
  .gantt-row .lbl-btn.interactive:hover b{color:var(--prompt);}
  .gantt-row .lbl-main{flex:1;min-width:0;font-size:19.5px;}
  .gantt-row .lbl-main b{font-weight:600;display:block;line-height:1.25;}
  .gantt-row .sub{font-size:17.5px;color:var(--fg-mute);line-height:1.45;margin-top:3px;word-break:break-word;}
  .gantt-row .arrow{
    font-size:16px;color:var(--fg-mute);line-height:1.2;padding-top:3px;
    transition:color .15s ease, transform .15s ease;flex-shrink:0;
  }
  .gantt-row.expanded .arrow{color:var(--prompt);}
  .gantt-details{
    grid-column:1 / -1;
    margin:10px 0 4px 2px;padding:10px 0 6px 18px;
    border-left:2px solid var(--prompt);
    background:color-mix(in oklab, var(--prompt) 4%, transparent);
  }
  .gantt-details ul{margin:0;padding-left:20px;color:var(--fg-dim);font-size:18px;line-height:1.7;}
  .gantt-details li{margin-bottom:4px;}
  .bar-track{position:relative;height:22px;}
  .bar-track .tick{position:absolute;top:0;bottom:0;width:1px;background:var(--line-soft);opacity:.6;}
  .bar{position:absolute;top:4px;height:14px;border-radius:2px;display:flex;align-items:center;padding:0 7px;font-size:16.5px;letter-spacing:.1em;color:var(--bg);}
  .bar.work{background:var(--fg);}
  .bar.res{background:transparent;border:1.2px solid var(--fg);background-image:repeating-linear-gradient(45deg,var(--fg) 0 1px,transparent 1px 5px);color:var(--fg);}
  .bar.edu{background:transparent;border:1.2px dashed var(--fg);color:var(--fg);}
  .bar.current{box-shadow:0 0 0 2px color-mix(in oklab, var(--prompt) 40%, transparent), 0 0 14px color-mix(in oklab, var(--prompt) 40%, transparent);}
  .now-marker{position:absolute;right:-6px;top:-12px;font-size:16px;letter-spacing:.15em;color:var(--prompt);}

  /* skills */
  .skills{padding:6px var(--gutter) 24px;display:grid;grid-template-columns:1fr;gap:0;}
  .skill-row{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start;padding:12px 0;border-bottom:1px dashed var(--line-soft);}
  .skill-row .g{font-size:18.5px;color:var(--fg-mute);letter-spacing:.14em;text-transform:uppercase;padding-top:3px;}
  .skill-row .items{display:flex;flex-wrap:wrap;gap:6px 7px;}
  .chip{font-size:18.5px;padding:3px 9px;border:1px solid var(--line-soft);color:var(--fg);background:var(--bg-card);border-radius:2px;transition:all .12s ease;}
  .chip:hover{border-color:var(--prompt);color:var(--prompt);box-shadow:0 0 10px color-mix(in oklab, var(--prompt) 25%, transparent);}

  /* footer prompt */
  .foot{padding:16px var(--gutter) 20px;font-size:19px;color:var(--fg-mute);display:flex;justify-content:space-between;align-items:center;}
  .foot .p{color:var(--prompt);}

  @media (max-width:920px){
    .hero-grid{grid-template-columns:1fr;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .gantt-row{grid-template-columns:1fr;}
    .gantt-row .bar-track{height:26px;}
  }
  @media (max-width:620px){
    .grid{grid-template-columns:1fr;}
    .skill-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="data/projects.js"></script>
<script type="text/babel" src="data/experience.js"></script>
<script type="text/babel" src="data/skills.js"></script>
<script type="text/babel" src="data/about.js"></script>
<script type="text/babel" src="scripts/lidar-maze.jsx"></script>
<script type="text/babel" src="scripts/terminal-app.jsx"></script>

</body>
</html>
